name: Linux CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest  

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore ConsoleMonopoly.sln

    - name: Check Code Style (Linux)
      run: dotnet format ConsoleMonopoly.sln --verify-no-changes --verbosity diagnostic

    - name: Build
      run: dotnet build ConsoleMonopoly.sln --no-restore

    - name: Test with Coverage
      run: |
        dotnet test ConsoleMonopoly.sln \
        --no-build \
        --verbosity normal \
        /p:CollectCoverage=true \
        /p:CoverletOutputFormat=opencover \
        /p:Threshold=70 \
        /p:ThresholdType=line